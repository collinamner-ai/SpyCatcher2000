<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spy Escape Room - Mission Control</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // ============ SVG ICONS (Lucide React replacements) ============
    const Lock = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>';
    const Clock = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';
    const AlertCircle = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
    const CheckCircle = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
    const LogOut = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>';
    const Plus = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>';
    const Trash2 = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';
    const Send = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
    const Gift = () => '<svg class="inline" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 12 20 2 4 2 4 12"></polyline><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M12 7v10"></path><path d="M7 12h10"></path></svg>';

    // ============ REACT COMPONENT ============
    const { useState, useEffect, useRef } = React;

    function SpyEscapeRoomApp() {
      const [gameState, setGameState] = useState({
        teams: [],
        gameCode: '',
        gameActive: false,
        startTime: null,
        elapsedTime: 0,
        hints: {},
      });

      const [userMode, setUserMode] = useState('select'); // select | admin | game | victory
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [codeInput, setCodeInput] = useState('');
      const [wrongAttempts, setWrongAttempts] = useState(0);
      const [isLocked, setIsLocked] = useState(false);
      const [lockTimeRemaining, setLockTimeRemaining] = useState(0);
      const [teamPenalties, setTeamPenalties] = useState({});
      const [adminTeams, setAdminTeams] = useState([]);
      const [adminCode, setAdminCode] = useState('');
      const [newTeamName, setNewTeamName] = useState('');
      const wsRef = useRef(null);

      // Connect to WebSocket
      useEffect(() => {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        
        wsRef.current = new WebSocket(wsUrl);
        
        wsRef.current.onopen = () => console.log('Connected to server');
        wsRef.current.onmessage = (event) => {
          const message = JSON.parse(event.data);
          if (message.type === 'gameState') {
            setGameState(message.payload);
          }
        };
        wsRef.current.onerror = () => console.log('WebSocket error');
        
        return () => wsRef.current && wsRef.current.close();
      }, []);

      // Main game timer
      useEffect(() => {
        if (!gameState.gameActive || userMode !== 'game') return;

        const interval = setInterval(() => {
          const now = Date.now();
          const baseElapsed = now - gameState.startTime;
          const totalPenalty = (teamPenalties[selectedTeam] || 0) * 1000;
          setGameState(prev => ({
            ...prev,
            elapsedTime: baseElapsed + totalPenalty
          }));
        }, 10);

        return () => clearInterval(interval);
      }, [gameState.gameActive, userMode, selectedTeam, teamPenalties]);

      // Lockout timer
      useEffect(() => {
        if (lockTimeRemaining <= 0) {
          setIsLocked(false);
          return;
        }

        const interval = setInterval(() => {
          setLockTimeRemaining(prev => Math.max(0, prev - 1));
        }, 1000);

        return () => clearInterval(interval);
      }, [lockTimeRemaining]);

      const formatTime = (ms) => {
        const totalSeconds = Math.floor(ms / 1000);
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        const ms_display = Math.floor((ms % 1000) / 10);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms_display.toString().padStart(2, '0')}`;
      };

      const handleCodeSubmit = () => {
        if (isLocked || codeInput.length < 4) return;

        if (codeInput === gameState.gameCode) {
          setUserMode('victory');
        } else {
          const newWrongAttempts = wrongAttempts + 1;
          setWrongAttempts(newWrongAttempts);
          setTeamPenalties(prev => ({
            ...prev,
            [selectedTeam]: (prev[selectedTeam] || 0) + 20
          }));
          setCodeInput('');

          if (newWrongAttempts >= 2) {
            setIsLocked(true);
            setLockTimeRemaining(10);
            setWrongAttempts(0);
          }
        }
      };

      const handleAddTeam = () => {
        if (newTeamName.trim()) {
          const newTeamId = Date.now().toString();
          setAdminTeams(prev => [...prev, { id: newTeamId, name: newTeamName }]);
          setGameState(prev => ({
            ...prev,
            teams: [...prev.teams, { id: newTeamId, name: newTeamName }],
            hints: { ...prev.hints, [newTeamId]: 0 }
          }));
          setNewTeamName('');
        }
      };

      const handleRemoveTeam = (teamId) => {
        setAdminTeams(prev => prev.filter(t => t.id !== teamId));
        setGameState(prev => ({
          ...prev,
          teams: prev.teams.filter(t => t.id !== teamId)
        }));
      };

      const handleStartGame = () => {
        if (adminCode.trim() && adminTeams.length > 0) {
          setGameState(prev => ({
            ...prev,
            gameCode: adminCode,
            gameActive: true,
            startTime: Date.now()
          }));
          setTeamPenalties({});
          setUserMode('select');
        }
      };

      const handleApplyHint = (teamId) => {
        setGameState(prev => ({
          ...prev,
          hints: { ...prev.hints, [teamId]: (prev.hints[teamId] || 0) + 1 }
        }));
        setTeamPenalties(prev => ({
          ...prev,
          [teamId]: (prev[teamId] || 0) + 60
        }));
      };

      const handleStopGame = () => {
        setGameState(prev => ({ ...prev, gameActive: false }));
        setAdminTeams([]);
        setAdminCode('');
        setTeamPenalties({});
      };

      const handleMissionComplete = () => {
        setUserMode('select');
        setSelectedTeam(null);
        setCodeInput('');
        setWrongAttempts(0);
        setIsLocked(false);
      };

      // ============ ADMIN PAGE ============
      if (userMode === 'admin') {
        return (
          <div className="min-h-screen bg-black text-white p-8">
            <div className="mb-12">
              <div className="text-red-600 text-sm tracking-widest mb-2">⚠ CLASSIFIED OPERATIONS CENTER</div>
              <h1 className="text-5xl font-bold text-white mb-2" style={{ textShadow: '0 0 20px rgba(239, 68, 68, 0.5)' }}>ADMIN TERMINAL</h1>
              <div className="h-px bg-red-600 w-48 mb-6"></div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
              <div className="lg:col-span-2 bg-zinc-900 border border-red-600 p-8">
                <h2 className="text-2xl font-bold text-red-500 mb-6 tracking-wider">MISSION BRIEFING</h2>

                {!gameState.gameActive ? (
                  <>
                    <div className="mb-8">
                      <label className="text-sm text-red-400 tracking-wider block mb-3">ADD TEAM OPERATIVES</label>
                      <div className="flex gap-2 mb-4">
                        <input
                          type="text"
                          value={newTeamName}
                          onChange={(e) => setNewTeamName(e.target.value)}
                          onKeyPress={(e) => e.key === 'Enter' && handleAddTeam()}
                          placeholder="Team name..."
                          className="flex-1 bg-black border border-red-600 text-white px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
                        />
                        <button onClick={handleAddTeam} className="bg-red-600 hover:bg-red-700 text-white px-6 py-2 font-bold transition">+ ADD</button>
                      </div>

                      <div className="space-y-2 mb-6 max-h-40 overflow-y-auto">
                        {adminTeams.map(team => (
                          <div key={team.id} className="flex justify-between items-center bg-black border border-red-600 p-3">
                            <span className="text-red-400">{team.name}</span>
                            <button onClick={() => handleRemoveTeam(team.id)} className="text-red-500 hover:text-red-400 transition">✕</button>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="mb-8">
                      <label className="text-sm text-red-400 tracking-wider block mb-3">MISSION CODE (4 DIGITS)</label>
                      <input
                        type="text"
                        maxLength="4"
                        value={adminCode}
                        onChange={(e) => setAdminCode(e.target.value.replace(/[^0-9]/g, ''))}
                        placeholder="0000"
                        className="w-full bg-black border border-red-600 text-white px-4 py-3 text-2xl font-bold tracking-widest focus:outline-none focus:ring-2 focus:ring-red-500"
                      />
                    </div>

                    <button
                      onClick={handleStartGame}
                      disabled={adminTeams.length === 0 || adminCode.length < 4}
                      className="w-full bg-red-600 hover:bg-red-700 disabled:bg-red-900 disabled:opacity-50 text-white font-bold py-4 text-xl transition"
                    >
                      INITIATE MISSION
                    </button>
                  </>
                ) : (
                  <div className="space-y-6">
                    <div className="bg-black border border-green-600 p-6">
                      <div className="text-green-600 text-sm tracking-wider mb-2">STATUS: ACTIVE</div>
                      <div className="text-white text-3xl font-bold">{formatTime(gameState.elapsedTime)}</div>
                    </div>
                    <button onClick={handleStopGame} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 text-lg transition">END MISSION</button>
                  </div>
                )}
              </div>

              {gameState.gameActive && (
                <div className="bg-zinc-900 border border-red-600 p-8">
                  <h2 className="text-2xl font-bold text-red-500 mb-6 tracking-wider">TEAM STATUS</h2>
                  <div className="space-y-4 max-h-96 overflow-y-auto">
                    {gameState.teams.map(team => (
                      <div key={team.id} className="bg-black border border-red-600 p-4">
                        <div className="text-red-400 font-bold mb-2">{team.name}</div>
                        <div className="text-white text-sm mb-3">Time: <span className="font-mono">{formatTime(gameState.elapsedTime + (teamPenalties[team.id] || 0) * 1000)}</span></div>
                        <div className="text-yellow-600 text-xs mb-3">Hints Used: {gameState.hints[team.id] || 0}/3</div>
                        <button
                          onClick={() => handleApplyHint(team.id)}
                          disabled={(gameState.hints[team.id] || 0) >= 3}
                          className="w-full bg-yellow-600 hover:bg-yellow-700 disabled:bg-yellow-900 disabled:opacity-50 text-black font-bold py-2 text-sm transition"
                        >
                          🎁 GRANT HINT
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <button onClick={() => setUserMode('select')} className="text-red-600 hover:text-red-400 font-bold transition">← EXIT ADMIN</button>
          </div>
        );
      }

      // ============ GAME PAGE ============
      if (userMode === 'game') {
        return (
          <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center p-4">
            <div className="text-center mb-12">
              <div className="text-red-600 text-sm tracking-widest mb-2">OPERATION IN PROGRESS</div>
              <div className="text-red-600 text-xl font-bold mb-8">{selectedTeam}</div>
            </div>

            <div className="mb-12">
              <div className="text-9xl font-mono font-bold text-center" style={{ color: '#ef4444', textShadow: '0 0 40px rgba(239, 68, 68, 0.8)' }}>
                {formatTime(gameState.elapsedTime + (teamPenalties[selectedTeam] || 0) * 1000)}
              </div>
              <div className="h-1 bg-red-600 mt-8 w-64 mx-auto"></div>
            </div>

            <div className="w-full max-w-md mb-8">
              <label className="text-red-400 text-sm tracking-wider block mb-4">ENTER MISSION CODE</label>
              <input
                type="password"
                value={codeInput}
                onChange={(e) => setCodeInput(e.target.value.replace(/[^0-9]/g, '').slice(0, 4))}
                onKeyPress={(e) => e.key === 'Enter' && !isLocked && handleCodeSubmit()}
                disabled={isLocked}
                maxLength="4"
                placeholder="••••"
                className="w-full bg-black border-2 border-red-600 text-white text-center text-4xl font-mono tracking-widest py-4 focus:outline-none focus:ring-2 focus:ring-red-500 disabled:opacity-50 transition"
              />
            </div>

            {isLocked && (
              <div className="w-full max-w-md mb-8">
                <div className="bg-red-600 text-black font-bold text-center py-3 mb-4">LOCKED - {lockTimeRemaining}s</div>
                <div className="h-1 bg-red-600 relative overflow-hidden">
                  <div className="h-full bg-black transition-all" style={{ width: `${(lockTimeRemaining / 10) * 100}%` }}></div>
                </div>
              </div>
            )}

            {wrongAttempts > 0 && !isLocked && (
              <div className="text-center mb-8">
                <div className="text-red-500 font-bold">⚠ FAILED ATTEMPTS: {wrongAttempts}/2</div>
              </div>
            )}

            <button
              onClick={handleCodeSubmit}
              disabled={isLocked || codeInput.length < 4}
              className="bg-red-600 hover:bg-red-700 disabled:bg-red-900 disabled:opacity-50 text-white font-bold py-4 px-12 text-xl mb-8 transition"
            >
              ➤ SUBMIT CODE
            </button>

            <button
              onClick={() => {
                setUserMode('select');
                setCodeInput('');
                setWrongAttempts(0);
              }}
              className="text-red-600 hover:text-red-400 font-bold transition mt-auto"
            >
              ← ABORT MISSION
            </button>
          </div>
        );
      }

      // ============ VICTORY PAGE ============
      if (userMode === 'victory') {
        return (
          <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center p-4">
            <style>{`@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }`}</style>
            <div style={{ animation: 'pulse 2s infinite', textShadow: '0 0 30px rgba(34, 197, 94, 0.8)' }} className="text-center mb-12">
              <div className="text-6xl mb-8">✓</div>
              <h1 className="text-6xl font-bold text-green-500 mb-4 tracking-widest">MISSION COMPLETE</h1>
              <h2 className="text-4xl font-bold text-green-400 mb-8">ACCESS GRANTED</h2>
            </div>

            <div className="bg-green-900 border-2 border-green-500 p-8 mb-12 text-center max-w-md">
              <div className="text-green-400 text-sm tracking-wider mb-4">COMPLETION TIME</div>
              <div className="text-5xl font-mono font-bold text-green-500 mb-4">
                {formatTime(gameState.elapsedTime + (teamPenalties[selectedTeam] || 0) * 1000)}
              </div>
              <div className="text-green-400 text-sm tracking-wider">SEQUENCE TERMINATED</div>
            </div>

            <div className="text-center mb-12">
              <h3 className="text-3xl font-bold text-green-400 mb-2">CONGRATULATIONS, AGENTS</h3>
              <p className="text-green-600">Operation successful. Returning to base...</p>
            </div>

            <button onClick={handleMissionComplete} className="bg-green-600 hover:bg-green-700 text-black font-bold py-4 px-12 text-xl transition">CLOSE</button>
          </div>
        );
      }

      // ============ TEAM SELECTION PAGE ============
      return (
        <div className="min-h-screen bg-black text-white p-8">
          <div className="text-center mb-16">
            <div className="text-red-600 text-sm tracking-widest mb-4">FIELD OPERATIONS</div>
            <h1 className="text-6xl font-bold mb-4" style={{ textShadow: '0 0 30px rgba(239, 68, 68, 0.6)' }}>MISSION BRIEFING</h1>
            <p className="text-red-600 font-mono">Select your team and prepare for deployment</p>
          </div>

          {gameState.gameActive ? (
            <div className="text-center mb-12">
              <div className="inline-block bg-green-900 border-2 border-green-500 px-8 py-4">
                <div className="text-green-400 text-sm tracking-widest mb-2">MISSION STATUS</div>
                <div className="text-3xl font-mono font-bold text-green-500">
                  {formatTime(gameState.elapsedTime)}
                </div>
              </div>
            </div>
          ) : (
            <div className="text-center mb-12">
              <div className="text-red-600 font-bold tracking-wider">AWAITING MISSION START...</div>
            </div>
          )}

          {gameState.gameActive && gameState.teams.length > 0 ? (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
              {gameState.teams.map(team => (
                <button
                  key={team.id}
                  onClick={() => {
                    setSelectedTeam(team.name);
                    setUserMode('game');
                    setCodeInput('');
                    setWrongAttempts(0);
                  }}
                  className="group relative h-32 bg-black border-2 border-red-600 hover:border-red-400 transition-all duration-300"
                  style={{ boxShadow: 'inset 0 0 20px rgba(239, 68, 68, 0.1)' }}
                >
                  <div className="absolute inset-0 flex flex-col items-center justify-center">
                    <div className="mb-3 text-red-600 group-hover:text-red-400 transition text-3xl">🔐</div>
                    <div className="text-2xl font-bold text-red-600 group-hover:text-red-400 transition text-center px-4">
                      {team.name}
                    </div>
                  </div>
                </button>
              ))}
            </div>
          ) : (
            <div className="text-center py-16 text-red-600">No mission active. Contact admin to initiate.</div>
          )}

          <div className="text-center mt-16 pt-8 border-t border-red-600">
            <button
              onClick={() => setUserMode('admin')}
              className="text-red-600 hover:text-red-400 font-bold tracking-wider transition text-sm"
            >
              [ADMIN ACCESS]
            </button>
          </div>
        </div>
      );
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SpyEscapeRoomApp />);
  </script>
</body>
</html>
